<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ford Cougar Club Italia</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, Helvetica, sans-serif;
    background:#05070a;
    color:#fff;
}

.hero{
    min-height:100vh;
    background:
        linear-gradient(rgba(0,0,0,0.72), rgba(0,0,0,0.82)),
        url("cougar_banner.png") center center / contain no-repeat;
    background-color:#05070a;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:30px;
}

.content{
    max-width:760px;
    text-align:center;
    background:rgba(0,0,0,0.62);
    border:1px solid rgba(255,255,255,0.18);
    border-radius:14px;
    padding:38px 28px;
    box-shadow:0 0 35px rgba(0,0,0,0.65);
    backdrop-filter:blur(4px);
}

h1{
    font-size:clamp(2rem,5vw,4.2rem);
    letter-spacing:2px;
    text-transform:uppercase;
    margin-bottom:16px;
    text-shadow:0 0 18px rgba(0,0,0,1);
}

p{
    font-size:clamp(1rem,2vw,1.25rem);
    line-height:1.6;
    color:#e6e6e6;
    margin-bottom:26px;
    text-shadow:0 0 12px rgba(0,0,0,1);
}

.badge{
    display:inline-block;
    padding:13px 24px;
    border:1px solid rgba(255,255,255,0.75);
    border-radius:6px;
    font-weight:700;
    letter-spacing:1px;
    text-transform:uppercase;
    background:rgba(255,255,255,0.08);
}

.note{
    margin-top:22px;
    font-size:0.95rem;
    color:#b8c6d9;
}

@media (max-width:768px){
    .hero{
        background-size:cover;
        background-position:center;
        padding:20px;
    }

    .content{
        padding:30px 20px;
    }

    h1{
        letter-spacing:1px;
    }
}
</style>
</head>

<body>

<section class="hero">
    <div class="content">
        <h1>Ford Cougar Club Italia</h1>
        <p>Il sito ufficiale della community italiana dedicata alla Ford Cougar.</p>
        <div class="badge">Sito in costruzione</div>
        <div class="note">Presto online con contenuti, foto, storia, raduni e area community.</div>
    </div>
</section>

</body>
</html>
