<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ford Cougar Club Italia</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, Helvetica, sans-serif;
    background:#111;
    color:#fff;
}

.hero{
    position:relative;
    height:100vh;
    background:url('cougar_banner.png') center center / cover no-repeat;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
}

.hero::before{
    content:"";
    position:absolute;
    inset:0;
    background:rgba(0,0,0,0.65);
}

.content{
    position:relative;
    z-index:1;
    padding:20px;
}

h1{
    font-size:clamp(2rem,5vw,4rem);
    margin-bottom:15px;
    text-transform:uppercase;
    letter-spacing:2px;
}

p{
    font-size:clamp(1rem,2vw,1.3rem);
    color:#d0d0d0;
}

.badge{
    margin-top:25px;
    display:inline-block;
    padding:12px 24px;
    border:1px solid #fff;
    border-radius:4px;
    font-weight:bold;
}
</style>
</head>

<body>

<section class="hero">
    <div class="content">
        <h1>Ford Cougar Club Italia</h1>
        <p>Il sito ufficiale della community italiana dedicata alla Ford Cougar.</p>
        <div class="badge">SITO IN COSTRUZIONE</div>
    </div>
</section>

</body>
</html>
