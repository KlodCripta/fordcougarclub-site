<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ford Cougar Club Italia</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#000;
    color:#fff;
    font-family:Arial, Helvetica, sans-serif;
    min-height:100vh;
}

.container{
    max-width:1200px;
    margin:0 auto;
    padding:40px 20px;
    text-align:center;
}

.banner{
    width:100%;
    max-width:1400px;
    height:auto;
    display:block;
    margin:0 auto 50px auto;
}

h1{
    font-size:clamp(2rem, 5vw, 4rem);
    text-transform:uppercase;
    letter-spacing:2px;
    margin-bottom:15px;
}

p{
    font-size:1.2rem;
    color:#d0d0d0;
    margin-bottom:30px;
}

.badge{
    display:inline-block;
    padding:12px 24px;
    border:1px solid #fff;
    border-radius:6px;
    font-weight:bold;
    text-transform:uppercase;
    letter-spacing:1px;
}

.note{
    margin-top:25px;
    color:#999;
    font-size:0.95rem;
}

@media (max-width:768px){

    .container{
        padding:20px 15px;
    }

    .banner{
        margin-bottom:30px;
    }

    p{
        font-size:1rem;
    }
}
</style>
</head>

<body>

<div class="container">

    <img src="cougar_banner.png" alt="Ford Cougar Club Italia" class="banner">

    <h1>Ford Cougar Club Italia</h1>

    <p>
        Il sito ufficiale della community italiana dedicata alla Ford Cougar.
    </p>

    <div class="badge">
        Sito in costruzione
    </div>

    <div class="note">
        Presto online con storia del modello, galleria fotografica, eventi e community.
    </div>

</div>

</body>
</html>
